# https://docs.gitlab.com/ee/ci/jobs/job_control.html
.default_rules:
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never # When in a MR, prefer that pipeline, do not run pipelines for branches too

variables:
  POSTGRES_HOST_AUTH_METHOD: trust
  CARGO_HOME: $CI_PROJECT_DIR/.cargo
  TESTCONTAINERS_HOST_OVERRIDE: "host.docker.internal"

image: "harbor.hendrikx-itc.nl/1optic/rust-ci:1.95.0.0@sha256:794278e69ec7190dbf95c6f4fbaec8527d5e030a498abbac2f5bca2ab70d9d55"

stages:
  - analyze
  - test
  - build
  - docs

lint-openapi:
  stage: analyze
  image:
    name: redocly/cli@sha256:bcb0cd0f7c0c48bd9a4285709a6b59f200416e7a20b1f521f4486d471d867e4e
    entrypoint: [""]
  script:
    - redocly lint api-spec/openapi.yaml
  rules:
    - !reference [.default_rules, rules]

lint:
  stage: analyze
  script:
    - cargo fmt --check
    - RUSTFLAGS="-Dwarnings" cargo clippy --all-targets --all-features
    - cargo shear
  rules:
    - !reference [.default_rules, rules]

sonarqube:
  stage: analyze
  image:
    name: sonarsource/sonar-scanner-cli:12
    entrypoint: [""]
  allow_failure: true
  script:
  - sonar-scanner -Dsonar.host.url="${SONAR_HOST_URL}"
  rules:
    - !reference [.default_rules, rules]

# Use cargo to test the project
unit-test:cargo:
  stage: test
  before_script:
    - rustup default nightly
  script:
    - rustc --version && cargo --version  # Print version info for debugging
    - cargo test --workspace --exclude integration-tests --verbose -- --format=json  -Z unstable-options | cargo2junit > results.xml
  artifacts:
    when: always
    reports:
      junit: results.xml
  rules:
    - !reference [.default_rules, rules]

integration-test:cargo:
  stage: test
  tags:
    - testcontainers
  before_script:
    - rustup default nightly
  script:
    - rustc --version && cargo --version  # Print version info for debugging
    - cargo build --package minerva-cli
    - cargo build --package minerva-service
    - RUST_LOG=info cargo test --package integration-tests --verbose -- --format=json  -Z unstable-options --nocapture | cargo2junit > results.xml
  artifacts:
    when: always
    reports:
      junit: results.xml
  rules:
    - !reference [.default_rules, rules]

build-minerva-cli-deb:
  stage: test # Test musl build
  artifacts:
    paths:
      - "target/**/*.deb"
  script:
    - cargo deb -p minerva-cli --target=x86_64-unknown-linux-musl
  rules:
    - !reference [.default_rules, rules]

publish-minerva-cli-deb:
  stage: build
  script:
    - |
      curl \
      --fail \
      -u "${REPO_USERNAME}:${REPO_PASSWORD}" \
      -H "Content-Type: multipart/form-data" \
      --data-binary "@./target/x86_64-unknown-linux-musl/debian/minerva-cli_${CI_COMMIT_TAG}-1_amd64.deb" \
      "$REPO_URL"
  rules:
    - if: $CI_COMMIT_TAG

build-image:
  stage: build
  image: quay.io/buildah/stable
  before_script:
    - echo "$DOCKER_REGISTRY_PASSWORD" | buildah login -u "$DOCKER_REGISTRY_USER" --password-stdin $DOCKER_REGISTRY
  script:
    - buildah build
      --file "${CI_PROJECT_DIR}/Dockerfile"
      --tag "${DOCKER_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
    - buildah push "${DOCKER_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG

build-instance-tester-image:
  stage: build
  image: quay.io/buildah/stable
  before_script:
    - echo "$DOCKER_REGISTRY_PASSWORD" | buildah login -u "$DOCKER_REGISTRY_USER" --password-stdin $DOCKER_REGISTRY
  script:
    - buildah build
      --file "${CI_PROJECT_DIR}/Dockerfile.instance-tester"
      --tag "${DOCKER_REGISTRY_IMAGE}-instance-tester:${CI_COMMIT_TAG}"
    - buildah push "${DOCKER_REGISTRY_IMAGE}-instance-tester:${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_TAG

build-docs:
  stage: docs
  script:
    - mdbook build documentation
    - rclone version
    - rclone
      --verbose
      --webdav-vendor other
      sync documentation/book/ :webdav:/static-sites/minerva
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
      - .gitlab-ci.yml
      - documentation/**
